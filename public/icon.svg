<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main gradient - WhatsApp green -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25D366"/>
      <stop offset="100%" style="stop-color:#128C7E"/>
    </linearGradient>
    
    <!-- Accent gradient for shine effect -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#128C7E" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect 
    x="20" 
    y="20" 
    width="472" 
    height="472" 
    rx="120" 
    fill="url(#mainGrad)"
    filter="url(#shadow)"
  />
  
  <!-- Shine overlay -->
  <rect 
    x="20" 
    y="20" 
    width="472" 
    height="236" 
    rx="120" 
    fill="url(#shineGrad)"
  />
  
  <!-- Chat bubble shape (WhatsApp symbol) -->
  <g transform="translate(256, 256)">
    <!-- Main chat bubble -->
    <path 
      d="M-120,-80 
         Q-120,-120 -80,-120 
         L80,-120 
         Q120,-120 120,-80 
         L120,40 
         Q120,80 80,80 
         L-40,80 
         L-80,120 
         L-60,80 
         L-80,80 
         Q-120,80 -120,40 
         Z" 
      fill="white"
      opacity="0.95"
    />
    
    <!-- Lightning bolt (automation/speed symbol) -->
    <path 
      d="M-15,-60 
         L25,-60 
         L5,-10 
         L35,-10 
         L-25,50 
         L-5,0 
         L-35,0 
         Z" 
      fill="url(#mainGrad)"
      stroke="#25D366"
      stroke-width="2"
      stroke-linejoin="round"
    />
  </g>
  
  <!-- Decorative circles (representing customers/connections) -->
  <circle cx="140" cy="140" r="30" fill="white" opacity="0.2"/>
  <circle cx="372" cy="140" r="30" fill="white" opacity="0.2"/>
  <circle cx="140" cy="372" r="25" fill="white" opacity="0.15"/>
  <circle cx="372" cy="372" r="25" fill="white" opacity="0.15"/>
  
  <!-- Small accent dots -->
  <circle cx="100" cy="256" r="8" fill="white" opacity="0.3"/>
  <circle cx="412" cy="256" r="8" fill="white" opacity="0.3"/>
</svg>
