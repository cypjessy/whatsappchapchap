<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>No Connection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #25D366;
      --green-glow: rgba(37, 211, 102, 0.15);
      --obsidian: #0A0B0F;
      --deep: #0F1117;
      --surface: #151820;
      --elevated: #1C2030;
      --border-light: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.88);
      --muted: rgba(255,255,255,0.5);
      --faint: rgba(255,255,255,0.2);
      --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --safe-top: env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: var(--obsidian);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(24px + var(--safe-top)) 24px calc(24px + var(--safe-bottom));
      position: relative;
    }

    /* ===== Animated Mesh Background ===== */
    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(ellipse 80% 60% at 50% -20%, rgba(37, 211, 102, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(37, 211, 102, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 60%);
    }

    .bg-mesh::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(circle at 30% 40%, rgba(37, 211, 102, 0.08) 0%, transparent 30%),
        radial-gradient(circle at 70% 60%, rgba(139, 92, 246, 0.05) 0%, transparent 30%);
      animation: mesh-drift 20s ease-in-out infinite;
    }

    @keyframes mesh-drift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(3%, -3%) rotate(3deg); }
      66% { transform: translate(-2%, 2%) rotate(-2deg); }
    }

    /* ===== Floating Orbs ===== */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(60px);
      opacity: 0.4;
    }

    .orb-1 {
      width: 200px;
      height: 200px;
      background: var(--green);
      top: 10%;
      left: -10%;
      animation: orb-float-1 12s ease-in-out infinite;
    }

    .orb-2 {
      width: 150px;
      height: 150px;
      background: #8B5CF6;
      bottom: 15%;
      right: -5%;
      animation: orb-float-2 15s ease-in-out infinite;
      animation-delay: 3s;
    }

    .orb-3 {
      width: 120px;
      height: 120px;
      background: #25D366;
      top: 60%;
      left: 60%;
      animation: orb-float-3 18s ease-in-out infinite;
      animation-delay: 6s;
      opacity: 0.25;
    }

    @keyframes orb-float-1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30%, 20%) scale(1.2); }
    }

    @keyframes orb-float-2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-20%, -25%) scale(1.3); }
    }

    @keyframes orb-float-3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-30%, -15%) scale(1.1); }
    }

    /* ===== Content Container ===== */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 340px;
      animation: content-enter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes content-enter {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ===== Satellite/WiFi Scanner Animation ===== */
    .scanner-container {
      position: relative;
      width: 140px;
      height: 140px;
      margin-bottom: 40px;
      animation: scanner-enter 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    @keyframes scanner-enter {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Outer ring pulse */
    .scanner-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(37, 211, 102, 0.15);
      animation: ring-pulse 3s ease-out infinite;
    }

    .scanner-ring:nth-child(2) {
      animation-delay: 1s;
    }

    .scanner-ring:nth-child(3) {
      animation-delay: 2s;
    }

    @keyframes ring-pulse {
      0% { transform: scale(0.85); opacity: 0.8; }
      100% { transform: scale(1.3); opacity: 0; }
    }

    /* Inner circle */
    .scanner-inner {
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(37, 211, 102, 0.12) 0%, rgba(37, 211, 102, 0.04) 100%);
      border: 1.5px solid rgba(37, 211, 102, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Scanning arc */
    .scanner-arc {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--green);
      animation: scan-rotate 2s linear infinite;
      mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
    }

    .scanner-arc-2 {
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-bottom-color: rgba(37, 211, 102, 0.6);
      animation: scan-rotate-reverse 2.5s linear infinite;
      mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
    }

    @keyframes scan-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes scan-rotate-reverse {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    /* WiFi icon */
    .wifi-icon {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .wifi-icon svg {
      width: 48px;
      height: 48px;
      fill: none;
      stroke: var(--green);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .wifi-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: wifi-dot-pulse 2s ease-in-out infinite;
    }

    @keyframes wifi-dot-pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* ===== Typography ===== */
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
      animation: text-enter 0.6s 0.4s both;
    }

    .subtitle {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 8px;
      animation: text-enter 0.6s 0.5s both;
    }

    .hint {
      font-size: 13px;
      color: var(--faint);
      line-height: 1.5;
      margin-bottom: 40px;
      animation: text-enter 0.6s 0.6s both;
    }

    @keyframes text-enter {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Retry Button ===== */
    .retry-btn {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 48px;
      background: linear-gradient(135deg, #25D366 0%, #1DAF59 100%);
      color: white;
      border: none;
      border-radius: 50px;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.35);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 56px;
      width: 100%;
      max-width: 280px;
      animation: btn-enter 0.6s 0.7s both;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .retry-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 10px rgba(37, 211, 102, 0.25);
    }

    .retry-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.2) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .retry-btn:hover::after {
      opacity: 1;
    }

    .retry-btn .btn-shimmer {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: btn-shimmer 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes btn-shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .retry-btn svg {
      width: 20px;
      height: 20px;
      transition: transform 0.5s;
    }

    .retry-btn.checking svg {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes btn-enter {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Status Indicator ===== */
    .status-indicator {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-light);
      border-radius: 50px;
      animation: status-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .status-indicator.visible {
      display: flex;
    }

    @keyframes status-in {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .status-dots {
      display: flex;
      gap: 4px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: status-dot-bounce 1.2s ease-in-out infinite;
    }

    .status-dot:nth-child(2) { animation-delay: 0.2s; }
    .status-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes status-dot-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .status-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    /* ===== Success Animation ===== */
    .success-indicator {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      animation: success-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .success-indicator.visible {
      display: flex;
    }

    @keyframes success-in {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .success-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(37, 211, 102, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success-circle svg {
      width: 24px;
      height: 24px;
      stroke: var(--green);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .success-label {
      font-size: 14px;
      color: var(--green);
      font-weight: 600;
    }

    /* ===== Footer ===== */
    .footer-note {
      position: fixed;
      bottom: calc(24px + var(--safe-bottom));
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: var(--faint);
      z-index: 1;
      animation: footer-enter 0.6s 0.9s both;
    }

    @keyframes footer-enter {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .footer-note span {
      color: var(--green);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-mesh"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Main Content -->
  <div class="content">

    <!-- Scanning Animation -->
    <div class="scanner-container">
      <div class="scanner-ring"></div>
      <div class="scanner-ring"></div>
      <div class="scanner-ring"></div>
      <div class="scanner-arc"></div>
      <div class="scanner-arc-2"></div>
      <div class="scanner-inner">
        <div class="wifi-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 18.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/>
            <path d="M12 14a5 5 0 0 1 3.5 1.5" opacity="0.7"/>
            <path d="M12 9.5a8.5 8.5 0 0 1 6 2.7" opacity="0.5"/>
            <path d="M12 5a12 12 0 0 1 8.5 3.8" opacity="0.3"/>
          </svg>
          <div class="wifi-dot"></div>
        </div>
      </div>
    </div>

    <!-- Text -->
    <h1>You're Offline</h1>
    <p class="subtitle">No internet connection found. We'll keep trying to reconnect.</p>
    <p class="hint">Make sure Wi-Fi or mobile data is enabled</p>

    <!-- Retry Button -->
    <button class="retry-btn" id="retryBtn" onclick="retryConnection(this)">
      <div class="btn-shimmer"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Try Again
    </button>

    <!-- Checking Indicator -->
    <div class="status-indicator" id="checking">
      <div class="status-dots">
        <div class="status-dot"></div>
        <div class="status-dot"></div>
        <div class="status-dot"></div>
      </div>
      <span class="status-label">Checking connection...</span>
    </div>

    <!-- Success Indicator -->
    <div class="success-indicator" id="success">
      <div class="success-circle">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <span class="success-label">Connected! Reloading...</span>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer-note">
    WhatsApp <span>Chap Chap</span>
  </div>

  <script>
    function retryConnection(btn) {
      const checking = document.getElementById('checking');
      const success = document.getElementById('success');

      btn.classList.add('checking');
      btn.disabled = true;
      checking.classList.add('visible');
      success.classList.remove('visible');

      // Check with increasing intervals
      let attempts = 0;
      const maxAttempts = 5;

      function checkConnection() {
        attempts++;

        if (navigator.onLine) {
          // Connected!
          btn.classList.remove('checking');
          checking.classList.remove('visible');
          success.classList.add('visible');

          setTimeout(function() {
            window.location.href = '/';
          }, 1200);
          return;
        }

        if (attempts < maxAttempts) {
          setTimeout(checkConnection, 800);
        } else {
          // Still offline
          btn.classList.remove('checking');
          checking.classList.remove('visible');
          btn.disabled = false;
        }
      }

      // Try fetching a small resource to double-check (navigator.onLine can be unreliable)
      fetch('/')
        .then(function() {
          // Success! We're online
          btn.classList.remove('checking');
          checking.classList.remove('visible');
          success.classList.add('visible');
          setTimeout(function() {
            window.location.href = '/';
          }, 1200);
        })
        .catch(function() {
          // Still offline, do the retry loop
          setTimeout(checkConnection, 500);
        });
    }

    // Auto-retry when connection comes back
    window.addEventListener('online', function() {
      const success = document.getElementById('success');
      success.classList.add('visible');
      setTimeout(function() {
        window.location.href = '/';
      }, 800);
    });

    // If somehow we load this page but actually have connection, redirect
    if (navigator.onLine) {
      window.location.href = '/';
    }
  </script>

</body>
</html>
