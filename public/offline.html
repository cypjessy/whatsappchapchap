<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Connection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f9f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }

    .icon-wrapper {
      width: 120px;
      height: 120px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    .icon-wrapper svg {
      width: 60px;
      height: 60px;
      color: #25D366;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.6;
      max-width: 280px;
      margin-bottom: 40px;
    }

    .retry-btn {
      background: #25D366;
      color: white;
      border: none;
      padding: 16px 48px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .retry-btn:active {
      transform: scale(0.96);
      box-shadow: 0 2px 8px rgba(37, 211, 102, 0.2);
    }

    .tip {
      margin-top: 32px;
      font-size: 13px;
      color: #9ca3af;
    }

    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 24px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #25D366;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .checking { display: none; }
    .checking.visible { display: block; }
  </style>
</head>
<body>

  <div class="icon-wrapper">
    <svg viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3 3l18 18M10.584 10.587a2 2 0 002.828 2.83M9.363 5.365A9.466 9.466 0 0112 5c4.478 0 8.268 2.943 9.543 7a9.51 9.51 0 01-.803 1.94M6.255 6.258A9.506 9.506 0 002.457 12c1.274 4.057 5.065 7 9.543 7 1.96 0 3.787-.573 5.323-1.565" />
    </svg>
  </div>

  <h1>You're Offline</h1>
  <p>No internet connection found. Check your Wi-Fi or mobile data and try again.</p>

  <button class="retry-btn" onclick="retryConnection()">
    Try Again
  </button>

  <div class="checking" id="checking">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <p class="tip">Checking connection...</p>
  </div>

  <p class="tip">WhatsApp Chap Chap needs internet to work</p>

  <script>
    function retryConnection() {
      const btn = document.querySelector('.retry-btn');
      const checking = document.getElementById('checking');

      btn.style.display = 'none';
      checking.classList.add('visible');

      // Check if back online
      setTimeout(() => {
        if (navigator.onLine) {
          window.location.href = '/';
        } else {
          btn.style.display = 'block';
          checking.classList.remove('visible');
        }
      }, 2000);
    }

    // Auto retry when connection comes back
    window.addEventListener('online', () => {
      window.location.href = '/';
    });
  </script>

</body>
</html>
