name: 🚀 Auto Release

on:
  workflow_dispatch:  # Allow manual trigger from GitHub UI
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'android/**'
      - 'package.json'
      - 'capacitor.config.ts'

# ⚠️  WARNING: Every push to `main` touching src/ triggers a full release
# (version bump + Firestore force update + APK build + GitHub Release).
# Push only when you intend to ship a new version to users!

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create releases, push tags, push commits

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sSLO https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -qqo commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -n 1

      - name: 🎯 Auto bump version
        id: version
        run: |
          node scripts/bump-version.js
          echo "name=$(node -p "require('fs').readFileSync('src/lib/app-version.ts','utf-8').match(/APP_VERSION_NAME\s*=\s*\"([^\"]+)\"/)[1]")" >> $GITHUB_OUTPUT
          echo "code=$(node -p "require('fs').readFileSync('src/lib/app-version.ts','utf-8').match(/APP_VERSION_CODE\s*=\s*(\d+)/)[1]")" >> $GITHUB_OUTPUT

      - name: Build Next.js + Sync Capacitor
        run: npm run build:android

      - name: 📱 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Stage APK for release
        run: cp android/app/build/outputs/apk/debug/app-debug.apk whatsappchapchap.apk

      # ⚠️  TODO: Remove `continue-on-error: true` once secrets are configured
      - name: 🔥 Update Firestore (force update)
        continue-on-error: true
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          APK_URL="https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.name }}/whatsappchapchap.apk"
          echo "📎 APK download URL: $APK_URL"
          node scripts/update-firestore-version.js --force --url "$APK_URL"

      - name: Commit and push version bump
        run: |
          git config user.name "whatsappchapchap-bot"
          git config user.email "bot@whatsappchapchap.app"
          git add src/lib/app-version.ts android/app/build.gradle
          git commit -m "Bump version to v${{ steps.version.outputs.name }} [skip ci]"
          git tag v${{ steps.version.outputs.name }}
          git push origin main --follow-tags

      - name: 📦 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: v${{ steps.version.outputs.name }}
          body: |
            ## WhatsApp Chap Chap v${{ steps.version.outputs.name }}

            🔄 **Force update triggered** — users on older versions will see the update dialog.

            📱 Download the APK below and install on your Android device.
          files: whatsappchapchap.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
